<ui:composition template="/templates/main.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui">

    <ui:define name="content">

        <h2>Reportes - Transacciones</h2>

        <h:form id="form">

            <p:panel header="Filtros" toggleable="true" collapsed="false" styleClass="ui-fluid">

                <!-- ✅ Filtros más pegados -->
                <p:panelGrid layout="grid" columns="12" styleClass="ui-fluid" style="padding:0; margin:0;">

                    <!-- Cliente -->
                    <h:outputText value="Cliente" styleClass="col-12 md:col-1"/>
                    <p:selectOneMenu value="#{reporteBean.usuarioId}"
                                     filter="true" filterMatchMode="contains"
                                     styleClass="col-12 md:col-3"
                                     style="width:140px">
                        <f:selectItem itemLabel="(Todos)" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItems value="#{reporteBean.usuarios}" var="u"
                                       itemLabel="#{u.nombre}" itemValue="#{u.id}"/>
                    </p:selectOneMenu>

                    <!-- Desde -->
                    <h:outputText value="Desde" styleClass="col-12 md:col-1"/>
                    <p:datePicker id="desde" value="#{reporteBean.desde}" pattern="yyyy-MM-dd" showIcon="true"
                                  styleClass="col-12 md:col-2"
                                  style="width:140px">
                        <p:ajax event="dateSelect" update="hasta"/>
                    </p:datePicker>

                    <!-- Hasta -->
                    <h:outputText value="Hasta" styleClass="col-12 md:col-1"/>
                    <p:datePicker id="hasta" value="#{reporteBean.hasta}" pattern="yyyy-MM-dd" showIcon="true"
                                  styleClass="col-12 md:col-2"
                                  style="width:140px"
                                  mindate="#{reporteBean.desde}"/>

                    <!-- Buscar -->
                    <p:commandButton value="Buscar" icon="pi pi-search"
                                     actionListener="#{reporteBean.buscar}"
                                     update=":form:tabla :layoutForm:msgs"
                                     styleClass="col-12 md:col-2"
                                     style="width:120px"/>

                </p:panelGrid>

                <p:separator/>

                <p:commandButton value="Exportar Excel" icon="pi pi-file-excel" ajax="false">
                    <p:fileDownload value="#{reporteBean.excelFile}"/>
                </p:commandButton>

                <p:spacer width="10"/>

                <p:commandButton value="Exportar PDF" icon="pi pi-file-pdf" ajax="false">
                    <p:fileDownload value="#{reporteBean.pdfFile}"/>
                </p:commandButton>

            </p:panel>

            <p:separator/>

            <p:dataTable id="tabla" value="#{reporteBean.lista}" var="t"
                         paginator="true" rows="15" rowsPerPageTemplate="10,15,25,50"
                         sortBy="#{t.fechaTransaccion}">

                <p:column headerText="ID" width="70">
                    <h:outputText value="#{t.id}"/>
                </p:column>

                <p:column headerText="Tipo" width="90">
                    <h:outputText value="#{t.tipoTransaccion}"/>
                </p:column>

                <p:column headerText="Usuario">
                    <h:outputText value="#{t.usuario.nombre}"/>
                </p:column>

                <p:column headerText="Concepto">
                    <h:outputText value="#{t.egreso != null ? t.egreso.descripcion : (t.ingreso != null ? t.ingreso.descripcion : '-') }"/>
                </p:column>

                <p:column headerText="Monto" width="120">
                    <h:outputText value="#{t.monto}"/>
                </p:column>

                <p:column headerText="Fecha" width="160">
                    <h:outputText value="#{t.fechaTransaccion}">
                        <f:convertDateTime pattern="yyyy-MM-dd HH:mm"/>
                    </h:outputText>
                </p:column>

            </p:dataTable>

        </h:form>

    </ui:define>
</ui:composition>
